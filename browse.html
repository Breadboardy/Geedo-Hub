<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Browse · Geedo Hub</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="assets/style.css">
<link rel="icon" href="assets/logo.svg">
<style>
  .filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
  .chip{padding:6px 14px;border-radius:999px;border:1px solid var(--line);background:var(--panel2);color:var(--mute);cursor:pointer;font-size:11px;letter-spacing:1px}
  .chip.active{background:var(--accent);color:#001018;border-color:var(--accent);font-weight:700}
  .search{flex:1;min-width:200px;background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-family:inherit;color:var(--text);font-size:12px}
  .search:focus{outline:none;border-color:var(--accent)}
  .empty{padding:60px;text-align:center;color:var(--mute);font-size:13px}

  /* preview modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:100}
  .modal-bg.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:28px;width:480px;text-align:center}
  .modal h2{font-family:'Silkscreen';font-size:18px;letter-spacing:2px;margin:0 0 6px}
  .modal .by{color:var(--mute);font-size:12px;margin-bottom:18px}
  .modal .play-canvas{width:384px;height:192px;background:#000;border-radius:8px;border:1px solid var(--line);image-rendering:pixelated;display:block;margin:0 auto 14px}
  .modal .actions{display:flex;gap:8px;justify-content:center;margin-top:14px}
  .modal-close{position:absolute;top:14px;right:18px;cursor:pointer;color:var(--mute);font-size:22px}
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="brand"><span class="dot"></span>GEEDO HUB</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="browse.html" class="active">Browse</a>
    <a href="unlock.html">Unlock</a>
    <a href="studio/index.html">Studio</a>
  </div>
  <div class="spacer"></div>
  <a href="https://github.com/breadboard/Geedo-Hub" class="btn">GitHub</a>
</nav>

<div class="container">
  <h2 class="sec-title">Browse Animations</h2>
  <p class="sec-sub">Public drops + discoveries. Private codes go on the Unlock page.</p>

  <div class="filter-bar">
    <span class="chip active" data-filter="all">All</span>
    <span class="chip" data-filter="public">Public</span>
    <span class="chip" data-filter="discover">Random</span>
    <span class="chip" data-filter="capsule">Time Capsules</span>
    <input type="text" id="search" class="search" placeholder="Search by name or tag...">
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">Nothing here yet — be the first to <a href="studio/index.html">make an animation</a>!</div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal" style="position:relative">
    <div class="modal-close" onclick="closeModal()">×</div>
    <h2 id="mName">Animation</h2>
    <div class="by" id="mBy">by someone</div>
    <canvas id="mCanvas" class="play-canvas" width="128" height="64"></canvas>
    <div id="mTags" class="tags" style="justify-content:center;display:flex;gap:6px"></div>
    <div class="actions">
      <a id="mDownload" class="btn primary" download>Download .json</a>
      <a id="mIno" class="btn" download>Get .ino</a>
    </div>
  </div>
</div>

<div class="foot">
  Geedo Hub · <a href="https://github.com/breadboard/Geedo-Hub">github</a>
</div>

<script>
let ANIMS=[];
let filter='all',search='';

fetch('animations/index.json')
  .then(r=>r.json())
  .then(d=>{ANIMS=d.animations||[];render()})
  .catch(()=>{ANIMS=[];render()});

document.querySelectorAll('.chip').forEach(c=>{
  c.onclick=()=>{
    document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');
    filter=c.dataset.filter;
    render();
  };
});
document.getElementById('search').oninput=e=>{search=e.target.value.toLowerCase();render()};

function render(){
  const list=ANIMS.filter(a=>{
    if(filter!=='all' && (a.visibility||'public')!==filter) return false;
    if(search){
      const hay=(a.name+' '+(a.tags||[]).join(' ')+' '+(a.author||'')).toLowerCase();
      if(!hay.includes(search)) return false;
    }
    return true;
  });
  const grid=document.getElementById('grid');
  const empty=document.getElementById('empty');
  grid.innerHTML='';
  if(!list.length){empty.style.display='block';return}
  empty.style.display='none';
  list.forEach(a=>{
    const vis=a.visibility||'public';
    const pillClass=vis==='public'?'ok':(vis==='discover'?'warn':(vis==='capsule'?'warn':'locked'));
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`
      <canvas class="thumb" width="128" height="64" data-id="${a.id}"></canvas>
      <h3>${a.name}</h3>
      <div class="by">by ${a.author||'unknown'} · ${a.frames||'?'} frames</div>
      <div class="tags">
        <span class="pill ${pillClass}">${vis}</span>
        ${(a.tags||[]).slice(0,2).map(t=>`<span class="pill">${t}</span>`).join('')}
      </div>`;
    card.onclick=()=>openAnim(a);
    grid.appendChild(card);
    // load thumb (first frame)
    if(a.file) loadThumb(a, card.querySelector('canvas'));
  });
}
function loadThumb(a, canvas){
  fetch('animations/'+a.file).then(r=>r.json()).then(d=>{
    if(!d.frames || !d.frames.length) return;
    drawFrame(canvas, d.frames[0].pixels);
  }).catch(()=>{});
}
function drawFrame(canvas, pixels){
  const ctx=canvas.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  const img=ctx.createImageData(128,64);
  for(let i=0;i<128*64;i++){
    const v=pixels[i]?255:0;
    img.data[i*4]=v;img.data[i*4+1]=v;img.data[i*4+2]=v;img.data[i*4+3]=255;
  }
  ctx.putImageData(img,0,0);
}

let playTimer=null;
function openAnim(a){
  document.getElementById('mName').textContent=a.name;
  document.getElementById('mBy').textContent='by '+(a.author||'unknown')+' · '+(a.frames||'?')+' frames';
  const tags=document.getElementById('mTags');
  tags.innerHTML='';
  const vis=a.visibility||'public';
  const pillClass=vis==='public'?'ok':(vis==='discover'?'warn':'locked');
  const v=document.createElement('span');v.className='pill '+pillClass;v.textContent=vis;tags.appendChild(v);
  (a.tags||[]).forEach(t=>{const s=document.createElement('span');s.className='pill';s.textContent=t;tags.appendChild(s)});

  document.getElementById('mDownload').href='animations/'+a.file;
  document.getElementById('mDownload').download=a.name+'.geedo.json';
  document.getElementById('mIno').style.display='none'; // we don't have .ino in repo

  document.getElementById('modal').classList.add('open');

  fetch('animations/'+a.file).then(r=>r.json()).then(d=>{
    const c=document.getElementById('mCanvas');
    let i=0;
    const tick=()=>{
      drawFrame(c, d.frames[i].pixels);
      i=(i+1)%d.frames.length;
      playTimer=setTimeout(tick, 1000/(d.fps||8));
    };
    if(playTimer) clearTimeout(playTimer);
    tick();
  });
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  if(playTimer){clearTimeout(playTimer);playTimer=null}
}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});
</script>
</body>
</html>
